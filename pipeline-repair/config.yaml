# config file for processing functional count data 

# experiment details
RAW_DATA:
    # path to input raw haircut fastqs
    "raw-data"

DATA:
    # path to output data files
    "output"

HAIRCUT_FASTA:
    "data/hairpin.fa"

10X_WHITELIST:
    # known barcodes used in the 10x libraires to use for error correction
    "../reanalyzed-data/barnyard_mrna/10xv2_whitelist.txt"

HAIRCUT_SAMPLES:
    - mix15_repair
    - mix30_repair
    - mix60_repair

CELL_BARCODES:
    # barcodes considered to be cells based on cellrange count run on mRNA
    # data
    - "../reanalyzed-data/mix15_mrna/counts_unfiltered/cellranger/barcodes.tsv"
    - "../reanalyzed-data/mix60_mrna/counts_unfiltered/cellranger/barcodes.tsv"
    - "../reanalyzed-data/mix30_mrna/counts_unfiltered/cellranger/barcodes.tsv"

SRC:
    # path to directory with source code " 
    "src"

CONDA:
    # path to directory with conda environment yaml files "
    "envs"
